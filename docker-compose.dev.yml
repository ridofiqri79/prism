services:
  postgres:
    image: postgres:16-alpine
    container_name: prism_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docs/prism_ddl.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./prism-backend
      dockerfile: Dockerfile.dev
    container_name: prism_backend_dev
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./prism-backend:/app
      - go_modules:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./prism-frontend
      dockerfile: Dockerfile.dev
    container_name: prism_frontend_dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./prism-frontend:/app
      - node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api/v1

volumes:
  postgres_dev_data:
  go_modules:
  node_modules: