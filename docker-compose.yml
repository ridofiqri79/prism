services:
  postgres:
    image: postgres:16-alpine
    container_name: prism_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/prism_ddl.sql:/docker-entrypoint-initdb.d/01_init.sql
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - prism_network

  backend:
    build:
      context: ./prism-backend
      dockerfile: Dockerfile
    container_name: prism_backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prism_network

  frontend:
    build:
      context: ./prism-frontend
      dockerfile: Dockerfile
    container_name: prism_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prism_network

  migrate:
      image: migrate/migrate
      container_name: prism_migrate
      volumes:
        - ./prism-backend/migrations:/migrations
      command: >
        -path=/migrations
        -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
        up
      depends_on:
        postgres:
          condition: service_healthy
      networks:
        - prism_network      

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - prism_network

networks:
  prism_network:
    driver: bridge

volumes:
  postgres_data: