name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,JWT_SECRET,JWT_EXPIRES_IN,VITE_API_BASE_URL,VITE_APP_NAME,CLOUDFLARE_TUNNEL_TOKEN
          script: |
            set -euo pipefail
            export PATH=$PATH:/usr/bin:/usr/local/bin
            cd /home/prism.admin/prism
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # Generate .env
            echo "POSTGRES_USER=${POSTGRES_USER}" > .env
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> .env
            echo "POSTGRES_DB=${POSTGRES_DB}" >> .env
            echo "PORT=8080" >> .env
            echo "ENV=production" >> .env
            echo "DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable" >> .env
            echo "JWT_SECRET=${JWT_SECRET}" >> .env
            echo "JWT_EXPIRES_IN=${JWT_EXPIRES_IN}" >> .env
            echo "VITE_API_BASE_URL=${VITE_API_BASE_URL}" >> .env
            echo "VITE_APP_NAME=${VITE_APP_NAME}" >> .env
            echo "CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}" >> .env

            # Verifikasi aman
            echo "=== Verifikasi .env ==="
            for var in POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB JWT_SECRET VITE_API_BASE_URL CLOUDFLARE_TUNNEL_TOKEN; do
              val=$(grep "^${var}=" .env | cut -d'=' -f2)
              if [ -z "$val" ]; then
                echo "❌ ${var} kosong!"
                exit 1
              else
                echo "✅ ${var} terisi"
              fi
            done

            # Stop container lama
            docker compose --profile tunnel down

            # Build image aplikasi
            docker compose --profile tunnel build --pull backend
            docker compose --profile tunnel build --pull --no-cache frontend

            # Jalankan postgres
            docker compose up -d postgres

            # Tunggu postgres healthy
            echo "Menunggu postgres ready..."
            until docker compose exec postgres pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} 2>/dev/null; do
              sleep 2
            done
            echo "✅ Postgres ready"

            # Jalankan migrasi
            echo "Menjalankan migrasi..."
            docker compose run --rm migrate
            echo "✅ Migrasi selesai"

            # Deploy semua service
            docker compose --profile tunnel up -d

            # Verifikasi container jalan
            echo "=== Status Container ==="
            docker compose --profile tunnel ps

            # Cleanup image lama
            docker image prune -f

            echo "✅ Deploy selesai!"
